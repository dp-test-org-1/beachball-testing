name: Role Restriction Test

on:
  workflow_dispatch:

jobs:
  check-user:
    runs-on: ubuntu-latest
    steps:
      - name: Check if user is authorized
        run: |
          if [[ "$GITHUB_ACTOR" != "Adu2120" ]]; then
            echo "Error: Unauthorized user. Exiting."
            exit 1
          fi
          echo "User is authorized. Proceeding with workflow.

      - name: Run tests
        run: echo "Running tests..."
