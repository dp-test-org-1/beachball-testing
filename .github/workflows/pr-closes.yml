name: Move Linked Issue to Done
on:
  pull_request:
    types: [closed]

permissions:
  repository-projects: write # Required to update project items
  pull-requests: read

jobs:
  move_to_done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Update Project Status
        # We use 'env' to safely pass variables to the shell script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          # Define your Project ID and the name of the 'Done' column
          PROJECT_ID: "1"
          TARGET_STATUS: "Complete"
        run: |
          # 1. Use GitHub CLI to find linked issues for this PR
          # The 'closingIssuesReferences' returns issues linked via keywords
          issues=$(gh pr view "$PR_URL" --json closingIssuesReferences -q '.closingIssuesReferences[].number')

          for issue_num in $issues; do
            echo "Moving issue #$issue_num to $TARGET_STATUS..."
            
            # 2. Use the 'gh project' command to move the issue
            # Note: This requires the issue to already be added to the project
            gh project item-edit --id "$PROJECT_ID" --project-id "$PROJECT_ID" --field "Status" --value "$TARGET_STATUS"
          done
